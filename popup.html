<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      width: 280px;
      padding: 16px;
      background: #18181b;
      color: #efeff1;
    }
    h1 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 16px;
      color: #bf94ff;
    }
    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      padding: 12px;
      background: #2d2d30;
      border-radius: 6px;
    }
    .status-label {
      font-size: 13px;
      color: #adadb8;
    }
    .status-value {
      font-size: 14px;
      font-weight: 600;
      color: #efeff1;
    }
    .toggle-container {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .toggle-label {
      font-size: 14px;
    }
    .toggle {
      position: relative;
      width: 44px;
      height: 24px;
    }
    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #59595d;
      border-radius: 24px;
      transition: 0.3s;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      border-radius: 50%;
      transition: 0.3s;
    }
    input:checked + .slider {
      background-color: #a970ff;
    }
    input:checked + .slider:before {
      transform: translateX(20px);
    }
    .claimed-count {
      font-size: 24px;
      font-weight: 700;
      color: #bf94ff;
    }
    .section-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #adadb8;
      margin-bottom: 8px;
      margin-top: 16px;
    }
    .btn-reset {
      width: 100%;
      padding: 8px;
      background: #2d2d30;
      border: none;
      border-radius: 6px;
      color: #adadb8;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-reset:hover {
      background: #3d3d40;
      color: #efeff1;
    }
    .footer {
      margin-top: 16px;
      text-align: center;
      font-size: 11px;
      color: #59595d;
    }
  </style>
</head>
<body>
  <h1>🎯 Twitch Auto Claimer</h1>

  <div class="status-row">
    <span class="status-label">Claimed Rewards</span>
    <span class="claimed-count" id="claimCount">0</span>
  </div>

  <div class="toggle-container">
    <span class="toggle-label">Auto-claim</span>
    <label class="toggle">
      <input type="checkbox" id="toggleSwitch" checked>
      <span class="slider"></span>
    </label>
  </div>

  <button class="btn-reset" id="resetBtn">Reset Counter</button>

  <div class="footer">
    Extension by 狐狐 🦊
  </div>

  <script src="popup.js"></script>
</body>
</html>
